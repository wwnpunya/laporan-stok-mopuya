<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barang</title>
  <script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    input, select, textarea, button { font-size: 16px; }
    @media (max-width: 640px) {
      th, td { padding: 0.5rem !important; }
      #hasilPencarian { font-size: 0.875rem; }
      #supabaseStatus { font-size: 0.75rem; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen p-2 sm:p-4 lg:p-6">
  <div class="max-w-7xl mx-auto w-full">
    <div class="bg-white rounded-xl sm:rounded-2xl shadow-lg p-4 sm:p-6 mb-4 sm:mb-6">
      <h1 class="text-2xl sm:text-3xl font-bold mb-2">Barang</h1>
      <p class="text-gray-600">Kategori: MODEM, ADAPTOR, SPLITTER 1/8, SPLITTER 1/4, SPLITTER 1/2, KABEL</p>
      <div class="mt-3">
        <span id="supabaseStatus" class="inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold bg-gray-200 text-gray-700">
          ⏳ Checking Supabase...
        </span>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-6">
      <div class="bg-white rounded-xl sm:rounded-2xl shadow-lg p-4 sm:p-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-4">
          <h2 class="text-xl sm:text-2xl font-semibold">Input Transaksi</h2>
          <span id="modeEdit" class="hidden bg-yellow-100 text-yellow-800 px-3 py-1 rounded-lg text-sm font-semibold">
            Mode Edit
          </span>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">Tanggal</label>
            <input type="date" id="tanggal" class="w-full border rounded-lg p-2" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Jenis Transaksi</label>
            <select id="jenis" class="w-full border rounded-lg p-2">
              <option value="Pemasangan">Pemasangan</option>
              <option value="Penggantian">Penggantian</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Kategori Barang</label>
            <select id="kategori" class="w-full border rounded-lg p-2">
              <option>MODEM</option>
              <option>ADAPTOR</option>
              <option>SPLITTER 1/8</option>
              <option>SPLITTER 1/4</option>
              <option>SPLITTER 1/2</option>
              <option>KABEL</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Jumlah Barang Keluar</label>
            <input type="number" id="jumlah" class="w-full border rounded-lg p-2" placeholder="Masukkan jumlah" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Nama Teknisi</label>
            <input type="text" id="teknisi" class="w-full border rounded-lg p-2" placeholder="Nama Teknisi" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">Keterangan</label>
            <textarea id="keterangan" class="w-full border rounded-lg p-2" rows="3" placeholder="Keterangan tambahan"></textarea>
          </div>

          <div class="grid grid-cols-1 gap-3">
            <button id="tombolSimpan" onclick="simpanData()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-xl">
              Simpan Data
            </button>
          </div>
        </div>
      </div>

      
    <div class="bg-white rounded-xl sm:rounded-2xl shadow-lg p-4 sm:p-6 mt-4 sm:mt-6">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
        <h2 class="text-xl sm:text-2xl font-semibold">Data Transaksi</h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 w-full md:w-auto">
          <select id="filterJenis" onchange="renderTable()" class="border rounded-lg p-2">
            <option value="">Semua Jenis</option>
            <option value="Pemasangan">Pemasangan</option>
            <option value="Penggantian">Penggantian</option>
          </select>

          <select id="filterKategori" onchange="renderTable()" class="border rounded-lg p-2">
            <option value="">Semua Kategori</option>
            <option value="MODEM">MODEM</option>
            <option value="ADAPTOR">ADAPTOR</option>
            <option value="SPLITTER 1/8">SPLITTER 1/8</option>
            <option value="SPLITTER 1/4">SPLITTER 1/4</option>
            <option value="SPLITTER 1/2">SPLITTER 1/2</option>
            <option value="KABEL">KABEL</option>
          </select>

          <select id="filterTeknisi" onchange="renderTable()" class="border rounded-lg p-2">
            <option value="">Semua Teknisi</option>
          </select>
        </div>
      </div>

      <div id="hasilPencarian" class="mb-4 bg-blue-50 border border-blue-200 rounded-xl p-3 font-semibold text-blue-800">
        Jumlah hasil: 0 transaksi | Total barang: 0
      </div>

      <div class="overflow-x-auto -mx-1 sm:mx-0">
        <table class="w-full min-w-[850px] border-collapse border border-gray-300 text-sm sm:text-base">
          <thead>
            <tr class="bg-gray-200">
              <th class="border p-2">Tanggal</th>
              <th class="border p-2">Jenis</th>
              <th class="border p-2">Kategori</th>
              <th class="border p-2">Jumlah</th>
              <th class="border p-2">Teknisi</th>
              <th class="border p-2">Keterangan</th>
              <th class="border p-2">Aksi</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="bg-white rounded-xl sm:rounded-2xl shadow-lg p-4 sm:p-6 mt-4 sm:mt-6">
      <h2 class="text-xl sm:text-2xl font-semibold mb-4">Rekap Barang Keluar</h2>
      <div id="rekap" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>
  </div>

  <script>
const SUPABASE_URL="https://hzzbsxlfexqwwfzrvlfz.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_YC0AqTDK0zA5BrGOUsCa3Q_SZ4Mdkn_";
const TABLE_NAME="transaksi_barang";

const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);


function setSupabaseStatus(connected) {
  const status = document.getElementById('supabaseStatus');
  if (!status) return;

  if (connected) {
    status.textContent = '🟢 Supabase Connected';
    status.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold bg-green-100 text-green-800';
  } else {
    status.textContent = '🔴 Supabase Disconnected';
    status.className = 'inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold bg-red-100 text-red-800';
  }
}

async function loadFromSupabase(){
  try {
    const {data,error}=await supabaseClient.from(TABLE_NAME)
      .select("*")
      .order("created_at",{ascending:false});

    if (error) {
      console.error('Supabase connection error:', error);
      setSupabaseStatus(false);
      return;
    }

    setSupabaseStatus(true);
    dataTransaksi=data || [];
    renderTable();
    renderRekap();
  } catch (error) {
    console.error('Supabase connection error:', error);
    setSupabaseStatus(false);
  }
}


const realtimeChannel = supabaseClient.channel('transaksi-barang-realtime')
  .on(
    'postgres_changes',
    {
      event: '*',
      schema: 'public',
      table: TABLE_NAME
    },
    () => {
      loadFromSupabase();
    }
  )
  .subscribe((status) => {
    console.log('Realtime status:', status);
    if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
      setSupabaseStatus(false);
    }
  });

</script>

<script>
    let dataTransaksi = [];
    let editId = null;

    const kategoriList = [
      'MODEM',
      'ADAPTOR',
      'SPLITTER 1/8',
      'SPLITTER 1/4',
      'SPLITTER 1/2',
      'KABEL'
    ];

    async function simpanData() {
      const tanggal = document.getElementById('tanggal').value;
      const jenis = document.getElementById('jenis').value;
      const kategori = document.getElementById('kategori').value;
      const jumlah = document.getElementById('jumlah').value;
      const teknisi = document.getElementById('teknisi').value;
      const keterangan = document.getElementById('keterangan').value;

      if (!tanggal || !jumlah || !teknisi) {
        alert('Lengkapi data terlebih dahulu');
        return;
      }

      const transaksi = {
        tanggal,
        jenis,
        kategori,
        jumlah: parseInt(jumlah),
        teknisi,
        keterangan
      };

      let error;

      const sedangEdit = editId !== null;

      if (sedangEdit) {
        const { data: dataUpdate, error: updateError } = await supabaseClient
          .from(TABLE_NAME)
          .update(transaksi)
          .eq('id', editId)
          .select();

        error = updateError;

        if (!error && (!dataUpdate || dataUpdate.length === 0)) {
          alert('Data tidak berubah. Pastikan policy UPDATE di Supabase sudah diaktifkan.');
          return;
        }
      } else {
        const hasilInsert = await supabaseClient.from(TABLE_NAME)
          .insert([transaksi]);
        error = hasilInsert.error;
      }

      if (error) {
        console.error('Gagal menyimpan:', error);
        alert('Gagal menyimpan ke Supabase: ' + error.message);
        return;
      }

      editId = null;
      resetForm();
      updateTombolSimpan();

      // Refresh langsung; Realtime juga akan menyinkronkan perangkat lain.
      await loadFromSupabase();

      alert(sedangEdit ? 'Data berhasil diperbarui' : 'Data berhasil disimpan ke Supabase');
    }

    function resetForm() {
      document.getElementById('jumlah').value = '';
      document.getElementById('teknisi').value = '';
      document.getElementById('keterangan').value = '';
    }

    function editData(id) {
      const item = dataTransaksi.find(data => String(data.id) === String(id));

      if (!item) {
        alert('Data tidak ditemukan');
        return;
      }

      editId = item.id;
      document.getElementById('tanggal').value = item.tanggal || '';
      document.getElementById('jenis').value = item.jenis || 'Pemasangan';
      document.getElementById('kategori').value = item.kategori || 'MODEM';
      document.getElementById('jumlah').value = item.jumlah || '';
      document.getElementById('teknisi').value = item.teknisi || '';
      document.getElementById('keterangan').value = item.keterangan || '';

      updateTombolSimpan();

      document.getElementById('tanggal').scrollIntoView({
        behavior: 'smooth',
        block: 'center'
      });
    }

    function updateTombolSimpan() {
      const tombol = document.getElementById('tombolSimpan');
      if (!tombol) return;

      const modeEdit = document.getElementById('modeEdit');

      if (editId !== null) {
        tombol.textContent = 'Update Data';
        tombol.className = 'bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2 rounded-xl';
        if (modeEdit) modeEdit.classList.remove('hidden');
      } else {
        tombol.textContent = 'Simpan Data';
        tombol.className = 'bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-xl';
        if (modeEdit) modeEdit.classList.add('hidden');
      }
    }

    async function hapusData(id) {
      if (!confirm('Yakin ingin menghapus data?')) {
        return;
      }

      const { error } = await supabaseClient.from(TABLE_NAME)
        .delete()
        .eq('id', id);

      if (error) {
        console.error('Gagal menghapus:', error);
        alert('Gagal menghapus data dari Supabase: ' + error.message);
        return;
      }

      // Refresh langsung; Realtime juga akan menyinkronkan perangkat lain.
      await loadFromSupabase();

      alert('Data berhasil dihapus dari Supabase');
    }

    function updateTeknisiFilter() {
      const select = document.getElementById('filterTeknisi');
      if (!select) return;

      const nilaiSekarang = select.value;
      const daftarTeknisi = [...new Set(
        dataTransaksi
          .map(item => (item.teknisi || '').trim())
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      select.innerHTML = '<option value="">Semua Teknisi</option>';
      daftarTeknisi.forEach(teknisi => {
        const option = document.createElement('option');
        option.value = teknisi;
        option.textContent = teknisi;
        select.appendChild(option);
      });

      if (daftarTeknisi.includes(nilaiSekarang)) {
        select.value = nilaiSekarang;
      }
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      const filterJenis = document.getElementById('filterJenis')?.value || '';
      const filterKategori = document.getElementById('filterKategori')?.value || '';
      const filterTeknisi = document.getElementById('filterTeknisi')?.value || '';

      updateTeknisiFilter();

      const hasil = dataTransaksi.filter(item => {
        const cocokJenis = !filterJenis || item.jenis === filterJenis;
        const cocokKategori = !filterKategori || item.kategori === filterKategori;
        const cocokTeknisi = !filterTeknisi || item.teknisi === filterTeknisi;
        return cocokJenis && cocokKategori && cocokTeknisi;
      });

      const totalBarang = hasil.reduce((sum, item) => sum + (Number(item.jumlah) || 0), 0);
      const hasilInfo = document.getElementById('hasilPencarian');
      if (hasilInfo) {
        hasilInfo.textContent = `Jumlah hasil: ${hasil.length} transaksi | Total barang: ${totalBarang}`;
      }

      tbody.innerHTML = '';

      hasil.forEach(item => {
        tbody.innerHTML += `
          <tr>
            <td class="border p-2">${item.tanggal}</td>
            <td class="border p-2">${item.jenis}</td>
            <td class="border p-2">${item.kategori}</td>
            <td class="border p-2 text-center">${item.jumlah}</td>
            <td class="border p-2">${item.teknisi}</td>
            <td class="border p-2">${item.keterangan || ''}</td>
            <td class="border p-2 text-center">
              <div class="flex items-center justify-center gap-2">
                <button onclick="editData(${item.id})"
                  class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded-lg">
                  Edit
                </button>
                <button onclick="hapusData(${item.id})"
                  class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg">
                  Hapus
                </button>
              </div>
            </td>
          </tr>
        `;
      });
    }

    function renderRekap() {
      const rekapDiv = document.getElementById('rekap');
      rekapDiv.innerHTML = '';

      kategoriList.forEach(kategori => {
        const total = dataTransaksi
          .filter(item => item.kategori === kategori)
          .reduce((sum, item) => sum + item.jumlah, 0);

        rekapDiv.innerHTML += `
          <div class="bg-blue-50 border border-blue-200 rounded-2xl p-4">
            <h3 class="font-bold text-lg">${kategori}</h3>
            <p class="text-3xl font-bold mt-2">${total}</p>
            <p class="text-gray-600">Total Barang Keluar</p>
          </div>
        `;
      });
    }

    window.addEventListener('DOMContentLoaded', async () => {
      renderTable();
      renderRekap();

      // Jika Supabase tidak merespons dalam 8 detik, tampilkan disconnected.
      const timeoutId = setTimeout(() => {
        const status = document.getElementById('supabaseStatus');
        if (status && status.textContent.includes('Checking')) {
          setSupabaseStatus(false);
        }
      }, 8000);

      await loadFromSupabase();
      clearTimeout(timeoutId);
    });
  </script>
</body>
</html>
